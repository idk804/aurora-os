name: Build Aurora OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        run: sudo systemctl start docker

      - name: Build in Arch container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/build \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm archiso git base-devel sudo
              cd /build/build-system
              chmod +x build.sh
              ./build.sh
            "

      - name: List output files
        run: ls -la build-system/out/ || echo "No output directory yet"

      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-os-iso
          path: build-system/out/*.iso

      - name: Create Release
        if: github.event_name == 'push' && success()
        run: |
          if ls build-system/out/*.iso 1>/dev/null 2>&1; then
            gh release create v0.1.0 build-system/out/*.iso --draft
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}