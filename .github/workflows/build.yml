name: Build Aurora OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Build in Arch container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/build \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm archiso git base-devel sudo
              cd /build/build-system && ./build.sh
            "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: aurora-os-iso
          path: build-system/out/*.iso

      - name: Create Release
        if: github.event_name == 'push'
        run: |
          gh release create v0.1.0 build-system/out/*.iso --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}